<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Financial Dashboard</h1>
            <p>Track your spending habits efficiently.</p>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Total Expense</h3>
                <p id="total-expense">$0.00</p>
            </div>
            <div class="card">
                <h3>This Month</h3>
                <p id="month-expense">$0.00</p>
            </div>
            <div class="card">
                <h3>Transactions</h3>
                <p id="transaction-count">0</p>
            </div>
        </div>

        <section class="form-container">
            <h2>Add New Expense</h2>
            <div class="form-group">
                <input type="text" id="desc" placeholder="Description (e.g., Grocery)">
                <input type="number" id="amount" placeholder="Amount">
                <select id="category">
                    <option value="Food">Food</option>
                    <option value="Necessities">Necessities</option>
                    <option value="Random">Random</option>
                </select>
                <button id="add-btn" onclick="addExpense()">Add Expense</button>
            </div>
        </section>

        <nav>
            <a href="history.html" class="nav-btn">View Transaction History</a>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
